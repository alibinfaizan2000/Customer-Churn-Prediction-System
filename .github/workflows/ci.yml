name: CI — Test Suite

    on:
      push:
        branches: [main, develop]
      pull_request:
        branches: [main]

    jobs:
      test:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Set up Python 3.11
            uses: actions/setup-python@v5
            with:
              python-version: "3.11"

          - name: Cache pip packages
            uses: actions/cache@v4
            with:
              path: ~/.cache/pip
              key: pip-${{ hashFiles('requirements.txt') }}

          - name: Install dependencies
            run: pip install -r requirements.txt

          - name: Run test suite
            run: PYTHONPATH=. pytest tests/ -v --tb=short
            env:
              ADMIN_API_KEY   = churn-admin-9b0935a288cf14c8e9aac89d800b8fb1
              SERVICE_API_KEY = churn-svc-45ed96991e58726d29e74d73696f78ca
              READONLY_API_KEY= churn-ro-9b709f83fa1368111f4a17c9e43d30db
              UI_API_KEY=churn-svc-45ed96991e58726d29e74d73696f78ca